repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: md-fabrication-typecheck
        name: md-fabrication typecheck
        entry: npx tsc --noEmit --project tsconfig.json
        language: system
        types: [text]
        pass_filenames: false

      - id: md-fabrication-lint
        name: md-fabrication lint
        entry: npx eslint src/
        language: system
        types: [text]
        pass_filenames: false
